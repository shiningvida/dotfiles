shell /opt/homebrew/bin/fish

include ./themes/cyberdream
include ./keybinds.conf

# LAYOUT
enabled_layouts tall:bias=50;full_size=1;mirrored=false

# WINDOW
window_padding_width 10

# CURSOR
cursor_shape beam
cursor_trail 3

# OPACITY
#background_blur 97
#background_opacity 0.90

# FONT RENDERING SHIT
hinting             full
anti_aliasing       true
subpixel_order      rgb  # or bgr, vrgb, vbgr, none

# BEGIN_KITTY_FONTS
font_family      family='FantasqueSansM Nerd Font' features=+ss01
font_size 17
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS
